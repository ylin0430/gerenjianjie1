<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>柯靜宜｜個人履歷</title>

<!-- 字型 -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #0f172a;
    --secondary: #6366f1;
    --accent: #22d3ee;
    --glass: rgba(255,255,255,0.08);
    --border: rgba(255,255,255,0.2);
}

/* 背景動畫 */
body {
    margin: 0;
    font-family: 'Noto Sans TC', sans-serif;
    color: white;
    background: linear-gradient(135deg, #0f172a, #1e293b, #020617);
    background-size: 300% 300%;
    animation: bgMove 12s ease infinite;
}

@keyframes bgMove {
    0% {background-position: 0%}
    50% {background-position: 100%}
    100% {background-position: 0%}
}

.container {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
}

/* Header */
header {
    text-align: center;
    padding: 60px 20px;
}

.profile-img {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    box-shadow: 0 0 30px rgba(34,211,238,0.5);
    transition: 0.4s;
}

.profile-img:hover {
    transform: scale(1.1);
}

h1 {
    margin: 15px 0 5px;
    font-size: 2.5rem;
}

.subtitle {
    color: #cbd5f5;
}

/* 卡片 */
.section {
    background: var(--glass);
    backdrop-filter: blur(14px);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 30px;
    margin-bottom: 30px;
    transition: 0.4s;
}

.section:hover {
    transform: translateY(-10px);
    box-shadow: 0 0 25px rgba(99,102,241,0.3);
}

.section-title {
    font-size: 1.8rem;
    margin-bottom: 20px;
    color: var(--accent);
}

/* 技能 */
.skill {
    margin-bottom: 15px;
}

.skill-bar {
    background: rgba(255,255,255,0.1);
    height: 10px;
    border-radius: 10px;
}

.skill-level {
    height: 100%;
    border-radius: 10px;
    background: linear-gradient(90deg, #6366f1, #22d3ee);
    width: 0;
    transition: 1.2s;
}

/* timeline */
.timeline-item {
    margin-bottom: 20px;
    padding: 20px;
    border-left: 3px solid var(--accent);
}

/* 動畫 */
.fade-in {
    opacity: 0;
    transform: translateY(30px);
    transition: 0.8s;
}

.fade-in.show {
    opacity: 1;
    transform: translateY(0);
}

/* 回頂 */
.back-to-top {
    position: fixed;
    right: 30px;
    bottom: 30px;
    background: var(--secondary);
    padding: 12px 15px;
    border-radius: 50%;
    cursor: pointer;
    display: none;
}

/* 響應式 */
@media(max-width:768px){
    h1{font-size:2rem;}
}
</style>
</head>

<body>

<header>
    <img src="IMG_3882.jpeg" class="profile-img">
    <h1>柯靜宜</h1>
    <p class="subtitle">亞洲大學｜資訊傳播學系</p>
    <p>🎯 目標：創意內容 / 影像剪輯 / 輕鬆但有成長的工作</p>
</header>

<main class="container">

<section class="section">
<h2 class="section-title">個人資訊</h2>
<p>📞 0912-345-678</p>
<p>📧 example@email.com</p>
<p>📍 台中</p>
</section>

<section class="section">
<h2 class="section-title">專業技能</h2>

<div class="skill">
<p>影片剪輯（Premiere）</p>
<div class="skill-bar"><div class="skill-level" data-level="80"></div></div>
</div>

<div class="skill">
<p>影像拍攝</p>
<div class="skill-bar"><div class="skill-level" data-level="75"></div></div>
</div>

<div class="skill">
<p>社群經營</p>
<div class="skill-bar"><div class="skill-level" data-level="70"></div></div>
</div>

<div class="skill">
<p>Python</p>
<div class="skill-bar"><div class="skill-level" data-level="20"></div></div>
</div>

</section>

<section class="section">
<h2 class="section-title">教育背景</h2>

<div class="timeline-item">
<p><strong>2025 - 至今</strong></p>
<p>亞洲大學｜資訊傳播學系</p>
</div>

<div class="timeline-item">
<p><strong>2022 - 2025</strong></p>
<p>高中</p>
</div>

</section>

<section class="section">
<h2 class="section-title">專案經歷</h2>

<div class="timeline-item">
<p><strong>校園影片製作</strong></p>
<p>拍攝＋剪輯30+活動影片</p>
</div>

<div class="timeline-item">
<p><strong>校園志工</strong></p>
<p>團隊合作與活動支援</p>
</div>

</section>

<section class="section">
<h2 class="section-title">自我介紹</h2>
<p>
我是亞洲大學資訊傳播學系學生，具備影像製作與數位內容創作能力，
熟悉影片剪輯與社群內容經營，喜歡創作並持續學習新技能。
</p>
</section>

</main>

<div class="back-to-top" id="backToTop">↑</div>

<script>
// 技能動畫
document.querySelectorAll(".skill-level").forEach(el=>{
    setTimeout(()=>{
        el.style.width = el.dataset.level + "%";
    },300);
});

// 滾動動畫
const observer = new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
        if(entry.isIntersecting){
            entry.target.classList.add("show");
        }
    });
});

document.querySelectorAll(".section").forEach(sec=>{
    sec.classList.add("fade-in");
    observer.observe(sec);
});

// 回到頂部
const btn = document.getElementById("backToTop");

window.addEventListener("scroll",()=>{
    btn.style.display = window.scrollY > 300 ? "block" : "none";
});

btn.onclick = ()=>window.scrollTo({top:0,behavior:"smooth"});
</script>

</body>
</html>
